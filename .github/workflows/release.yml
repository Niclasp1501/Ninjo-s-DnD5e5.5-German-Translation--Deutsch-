name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  package-and-release:
    if: ${{ !contains(github.ref_name, '-beta') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read module metadata
        id: version
        run: |
          VERSION=$(python -c "import json; d=json.load(open('module.json', encoding='utf-8')); print(d['version'])")
          COMPAT_MIN=$(python -c "import json; d=json.load(open('module.json', encoding='utf-8')); print(d.get('compatibility', {}).get('minimum', ''))")
          COMPAT_VERIFIED=$(python -c "import json; d=json.load(open('module.json', encoding='utf-8')); print(d.get('compatibility', {}).get('verified', ''))")
          COMPAT_MAX=$(python -c "import json; d=json.load(open('module.json', encoding='utf-8')); print(d.get('compatibility', {}).get('maximum', ''))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "compat_min=$COMPAT_MIN" >> $GITHUB_OUTPUT
          echo "compat_verified=$COMPAT_VERIFIED" >> $GITHUB_OUTPUT
          echo "compat_max=$COMPAT_MAX" >> $GITHUB_OUTPUT

      - name: Verify tag matches module version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "Tag $TAG does not match module.json version v$VERSION"
            exit 1
          fi

      - name: Build module.zip
        run: |
          mkdir -p dist
          INCLUDE_FILES="module.json README.md CHANGELOG.md LICENSE"
          INCLUDE_DIRS="languages scripts babele packs templates styles assets"

          ZIP_INPUTS="$INCLUDE_FILES"
          for d in $INCLUDE_DIRS; do
            if [ -d "$d" ]; then
              ZIP_INPUTS="$ZIP_INPUTS $d"
            fi
          done

          zip -r dist/module.zip $ZIP_INPUTS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            module.json
            dist/module.zip

      - name: Publish to Foundry Package API (dry-run)
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
          PACKAGE_ID: foundryvtt-dnd5e55-lang-de
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MANIFEST_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/module.json"
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          curl -fsS -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRY_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"${PACKAGE_ID}\",
              \"dry-run\": true,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"${MANIFEST_URL}\",
                \"notes\": \"${NOTES_URL}\",
                \"compatibility\": {
                  \"minimum\": \"${{ steps.version.outputs.compat_min }}\",
                  \"verified\": \"${{ steps.version.outputs.compat_verified }}\",
                  \"maximum\": \"${{ steps.version.outputs.compat_max }}\"
                }
              }
            }"

      - name: Publish to Foundry Package API
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
          PACKAGE_ID: foundryvtt-dnd5e55-lang-de
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MANIFEST_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/module.json"
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          curl -fsS -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRY_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"${PACKAGE_ID}\",
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"${MANIFEST_URL}\",
                \"notes\": \"${NOTES_URL}\",
                \"compatibility\": {
                  \"minimum\": \"${{ steps.version.outputs.compat_min }}\",
                  \"verified\": \"${{ steps.version.outputs.compat_verified }}\",
                  \"maximum\": \"${{ steps.version.outputs.compat_max }}\"
                }
              }
            }"
