name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate core JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          files = [
            'module.json',
            'languages/de.json',
            'config/scope-blocklist.json',
            'config/scope-allowlist.json',
            'config/glossary.json',
            'config/metric-policy.json',
            'config/legacy-provenance-policy.json',
            'config/legacy-id-allowlist.json'
          ]
          for f in files:
            json.loads(Path(f).read_text(encoding='utf-8-sig'))
          print('core-json-ok')
          PY


