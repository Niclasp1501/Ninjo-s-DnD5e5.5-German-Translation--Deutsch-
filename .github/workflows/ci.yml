name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('module.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('languages/de.json','utf8'))"
